name: Night Agent QA Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *" # 02:00 Kyiv time

jobs:
  night-agent:
    runs-on: ubuntu-latest

    env:
      LLM_PROVIDER: mock
      ADMIN_OVERRIDE_TOKEN: test-secret-123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run seed

      - run: bash scripts/night-run.sh
