name: QA Gate — Night Agent

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  qa:
    name: QA Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install sqlite3
        run: sudo apt-get install -y sqlite3

      - name: Install QA deps
        run: npm install

      - name: Install server deps
        working-directory: ./coinhaven-server
        run: npm install

      - name: Seed database
        working-directory: ./coinhaven-server
        run: |
          mkdir -p data
          node --experimental-sqlite scripts/seed.js

      - name: Start server
        working-directory: ./coinhaven-server
        run: |
          LLM_PROVIDER=mock ADMIN_OVERRIDE_TOKEN=test-secret-123 node --experimental-sqlite server.js &
          sleep 5
          curl -sf http://localhost:3000/api/health || exit 1

      - name: Run API tests
        run: npx tsx tests/api/api.test.ts
        continue-on-error: true

      - name: Run AI safety tests
        run: npx tsx tests/ai/ai-safety.test.ts
        continue-on-error: true
        env:
          LLM_PROVIDER: mock
          ADMIN_OVERRIDE_TOKEN: test-secret-123

      - name: Run DB integrity tests
        continue-on-error: true
        run: npx tsx tests/db/db.test.ts

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ github.run_number }}
          path: reports/
          if-no-files-found: ignore

      - name: QA Verdict
        if: always()
        run: |
          echo "## ⛔ DO NOT SHIP — CRITICAL findings active" >> $GITHUB_STEP_SUMMARY
          echo "Night Agent completed. See reports/ for details." >> $GITHUB_STEP_SUMMARY
